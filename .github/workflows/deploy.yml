name: Deploy wiki to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo run en vuelo; si llegan varios push seguidos (p. ej. guardados del
# CMS), solo queda encolado el último — los intermedios se descartan.
concurrency:
  group: pages
  cancel-in-progress: false

# Un único job (antes eran tres): se ahorra el arranque de dos runners y, con
# la caché de node_modules, el commit→publicado queda en ~30s.
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # necesario para lastUpdated

      # Guardias anti-fuga (los push directos a main no pasan por el CI de PR):
      # el overlay privado no puede estar trackeado, ningún fichero confidencial
      # puede estar en el árbol público, y el build no puede emitir /private/.
      - name: Leak guards
        run: |
          if [ -d docs/private ]; then
            echo "::error::docs/private existe en el checkout público." && exit 1
          fi
          if git grep -l "confidential: true" -- docs; then
            echo "::error::Fichero(s) confidenciales en el árbol público." && exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Caché de node_modules completo: si el lockfile no cambió, npm ci se
      # salta entero (la única dependencia es VitePress; instala poco pero
      # tarda — este paso es el grueso de la mejora de latencia).
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run build

      # Semantic search index (browser-side AI search). In the public checkout
      # docs/private does not exist, so this indexes public content only. Runs
      # before the leak guard so the guard also scans the generated index.
      - name: Install search-index deps
        run: npm ci
        working-directory: scripts/search
      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: scripts/search/.model-cache
          key: search-model-v1
      - name: Build semantic search index
        run: node build-index.mjs ../../docs ../../docs/.vitepress/dist/search-index.json
        working-directory: scripts/search

      - name: Leak guard — no /private/ pages nor private-repo refs in the public build
        run: |
          if [ -e docs/.vitepress/dist/private ]; then
            echo "::error::El build público contiene páginas bajo /private/." && exit 1
          fi
          if grep -rq 'formacion-private' docs/.vitepress/dist; then
            echo "::error::El build público referencia el repo privado." && exit 1
          fi
          if [ -f docs/.vitepress/dist/search-index.json ] && grep -q '"/private/' docs/.vitepress/dist/search-index.json; then
            echo "::error::El índice de búsqueda público contiene rutas /private/." && exit 1
          fi

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
      - id: deployment
        uses: actions/deploy-pages@v4

      # Avisa al repo privado para que reconstruya el sitio autenticado con el
      # contenido público nuevo. Opcional: solo actúa si existe el secret
      # PRIVATE_WIKI_DISPATCH_TOKEN (ver README de formacion-private).
      - name: Trigger private wiki rebuild
        env:
          PAT: ${{ secrets.PRIVATE_WIKI_DISPATCH_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "Sin PRIVATE_WIKI_DISPATCH_TOKEN — se omite (el sitio privado se actualizará en su próximo despliegue)."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/pedro-morago/formacion-private/dispatches \
            -d '{"event_type":"public-wiki-updated"}'
